model:
  name: llama-3.1-8b-instruct
  type: arm
  hf_id: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16

loss:
  mode: nll
  mc_samples: 1

finetune:
  enabled: true
  lr: 1.0e-5
  epochs: 5
  batch_size: 1
  gradient_accumulation_steps: 16
  weight_decay: 0.01
  max_length: 256
  save_dir: /diskthalys/ssd14ta/kmunaoka/Research/unlearn-relearn-reversibility/workdir/finetune

# NPO: bounded loss via log-sigmoid of log p_theta/p_ref ratio.
# TOFU/OpenUnlearning convention: beta=0.1, alpha=1.0, lr=1e-5, epochs=10.
unlearning:
  method: npo
  lr: 1.0e-5
  epochs: 10
  batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  lr_scheduler: linear
  method_params:
    npo_beta: 0.1
    npo_alpha: 1.0

benchmark:
  name: tofu
  forget_split: forget01
  retain_split: retain99

relearn:
  enabled: false
  lr: 1.0e-5
  max_steps: 500
  num_cycles: 1

output_dir: results
seed: 42
