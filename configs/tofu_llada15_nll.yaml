model:
  name: llada-1.5
  type: mdm
  hf_id: GSAI-ML/LLaDA-1.5
  dtype: bfloat16

loss:
  mode: nll
  mc_samples: 1

finetune:
  enabled: true
  lr: 1.0e-5
  epochs: 5
  batch_size: 1
  gradient_accumulation_steps: 16
  weight_decay: 0.01
  max_length: 256
  save_dir: /diskthalys/ssd14ta/kmunaoka/Research/unlearn-relearn-reversibility/workdir/finetune

unlearning:
  method: eu
  lr: 5.0e-5
  steps: 500
  batch_size: 1
  method_params:
    eu_lambda: 1.0
    loss_mode: nll

benchmark:
  name: tofu
  forget_split: forget01
  retain_split: retain99

relearn:
  enabled: false
  lr: 5.0e-5
  max_steps: 500
  num_cycles: 1

output_dir: results
seed: 42
