model:
  name: llama-3.1-8b-instruct
  type: arm
  hf_id: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16

loss:
  mode: nll
  mc_samples: 1

finetune:
  enabled: true
  lr: 1.0e-5
  epochs: 5
  batch_size: 1
  gradient_accumulation_steps: 16
  weight_decay: 0.01
  max_length: 256
  save_dir: /diskthalys/ssd14ta/kmunaoka/Research/unlearn-relearn-reversibility/workdir/finetune

# Gradient Ascent: L = -L_forward. Unbounded, fast to collapse.
# TOFU convention: lr=1e-5, epochs<=5, early stopping recommended.
unlearning:
  method: ga
  lr: 1.0e-5
  epochs: 5
  batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  lr_scheduler: linear
  method_params: {}

benchmark:
  name: tofu
  forget_split: forget01
  retain_split: retain99

relearn:
  enabled: false
  lr: 1.0e-5
  max_steps: 500
  num_cycles: 1

output_dir: results
seed: 42
